name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bun test
      - name: Build binary
        run: bun build src/cli.ts --compile --outfile dist/ac
      - name: Verify binary
        run: ./dist/ac --version
